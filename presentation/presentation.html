        # Using AI Tools and Python to Automate Tasks

        _A two-day, beginner-friendly journey to streamline workflows, boost productivity, and integrate AI into everyday tasks._

        ---

        # Goals

        1. **Understand the basics of Python scripting without prior programming experience**  

        --

        2. **Explore ways to leverage LLMs in combination with Python**  

        --

        3. **Learn how to automate tasks such as file organization and data entry**  

        --

        4. **Use Python scripts to integrate with external LLM APIs**

        ---
        class: center, middle

        # What Can — and Can't — Be Automated with Python?

        ### Building intuition before writing code

        ---

        # Where we're going

        **Part 1 — What Python _can_ do for you**
        A framework for spotting automations in your own work.

        **Part 2 — What Python _can't_ do for you**
        A framework for avoiding expensive dead ends.

        > The hard part of automation isn't the code.
        > AI can write the code.
        > The hard part is **seeing the automation**.

        # Part 1
        ## What can you automate?

        ---

        # The core mental model

        Every automation is three things:

        # `INPUT → PROCESS → OUTPUT`

        Before writing any code, fill in three blanks.

        | Blank        | Example                                        |
        | ------------ | ---------------------------------------------- |
        | **Input?**   | A folder, CSV, URL, PDF, clipboard, API call   |
        | **Process?** | Rename, filter, extract, summarize, convert    |
        | **Output?**  | A new file, a report, an email, a sheet row    |

        ---

        # Example — filled in

        **Task:** "Rename all photos in a folder by the date they were taken."

        - **Input:** a folder of photos
        - **Process:** read each photo's EXIF date
        - **Output:** renamed files in the same folder

        If you can say it in one sentence like this, **you have a script**.

        ---

        # The sniff test — is it worth automating?

        Four yes/no questions:

        1. Do I do this **more than once**?
        2. Are the steps **predictable**?
        3. Does the input live somewhere a computer can **reach**?
        4. Is the output something a computer can **produce**?

        **4 yeses** → strong candidate
        **2 or fewer** → not worth automating yet

        > Twice is a coincidence. Three times is a script.

        ---

        # The five categories

        Most beginner-friendly automations fall into one of these buckets.

        | # | Category             | What it touches              |
        | - | -------------------- | ---------------------------- |
        | 1 | Files & folders      | Your filesystem              |
        | 2 | Text & data          | Documents, tables, PDFs      |
        | 3 | The web              | URLs, pages, public data     |
        | 4 | App integrations     | Gmail, Slack, Notion, etc.   |
        | 5 | AI-powered           | Language & judgment tasks    |

        _A teaching shortcut, not an official taxonomy._

        ---

        # Category examples (1–3)

        **1. Files & folders**
        Rename 300 photos by date • Sort Downloads by file type • Zip-backup a folder every Friday

        **2. Text & data**
        Clean a CSV • Extract emails from a folder of PDFs • Convert `.docx` → Markdown

        **3. The web**
        Track a stock price daily • Scrape public headlines • Call a public API, save as spreadsheet

        ---

        # Category examples (4–5)

        **4. App integrations**
        Read unread Gmail and log subjects • Post a daily Slack summary • Sync calendar events into Notion

        **5. AI-powered**
        Summarize a folder of meeting notes • Classify incoming support emails • Turn voice memo transcripts into clean drafts

        > Common thread in green-zone work: data is **reachable**, rules are **describable**, errors are **cheap**.

        ---

        # From idea to runnable script — 4 steps

        1. **Write the one-sentence spec**
          _"Take `<input>`, do `<process>`, produce `<output>`."_

        2. **Ask an AI to draft it** (template on next slide)

        3. **Run it**
          `uv run python scripts/my_tool.py --input ./folder`

        4. **Turn it into a CLI tool**
          `argparse` + save to `scripts/` + a `--help` description

        ---

        # Reusable AI prompt template

        ```
        Write a Python script that:
        - Takes <input> as input
        - Does <process>
        - Produces <output>

        Make it runnable from the command line with argparse.
        Use only the standard library unless you need <library>.
        ```

        Paste your one-sentence spec into the blanks. That's it.

        ---

        # Script → CLI tool

        The jump students underestimate is **not** writing the code.
        It's turning a one-off script into a reusable tool.

        Three moves:

        1. Replace hardcoded paths with `argparse` arguments
        2. Save it to `scripts/` with a clear name
        3. Add a one-line `--help` description

        **That's the whole difference** between a script and a tool.

        # Part 2
        ## What Python _can't_ do for you

        ---

        # The core frame: the four R's

        Before committing to automate something, ask:

        | Question          | What it's really asking                                     |
        | ----------------- | ----------------------------------------------------------- |
        | **Reach?**        | Can my code get to the data and act on the system?          |
        | **Rules?**        | Can I describe the logic in plain steps?                    |
        | **Reliability?**  | Am I OK with occasional mistakes?                           |
        | **Risk?**         | If it misfires, is the worst case recoverable?              |

        The four answers sort every task into a zone.

        ---

        # Three zones

        **■ GREEN** — Build it. Python is great at this.

        **■ YELLOW** — Possible, but fragile. Build it small. Babysit it.

        **■ RED** — Don't aim Python here. Keep a human in the loop.

        ---

        # **Green zone** — Python shines

        - Moving data between files and formats (CSV ↔ JSON ↔ Excel, PDFs, logs)
        - Talking to documented APIs (OpenAI, Anthropic, GitHub, Notion, Gmail)
        - Scraping **public, static** web pages
        - Running things on a schedule (backups, daily reports)
        - LLM language tasks: summarize, classify, extract, rewrite
        - Gluing tools together — "when X happens in A, write to B"

        Common thread: **reachable, describable, cheap to get wrong.**

        ---

        # **Yellow zone** — possible, but fragile

        - Scraping sites with logins, captchas, or heavy JavaScript
        - Automating desktop apps by clicking buttons (breaks on every update)
        - Parsing messy/inconsistent documents (scanned PDFs, wild emails)
        - Anything that "mostly works" 90% of the time — when the other 10% matters
        - Long chains of AI calls without verification steps

        > Rule of thumb: **build it small, watch it run, expect to babysit.**

        ---

        # **Red zone** — wrong shape of problem

        **Reach:** closed systems, 2FA/SSO with no API, mobile-only apps, physical tasks
        **Rules:** tasks that need genuine human judgment every time
        **Reliability:** near-perfect is required (medical, legal, safety)
        **Risk:** irreversible or expensive failure (moving money, mass email, bulk delete)

        > If any of the four R's lands in red, **keep the human in the loop** — or pick a smaller version of the task.

        ---

        # The AI-specific trap

        Because this course uses AI heavily, two failure modes matter:

        **1. Silent wrongness**
        LLMs produce confident, fluent output even when it's wrong.

        **2. Drift**
        The same prompt can give different outputs on different days or model versions.

        **Habit:** print the AI's output before you act on it — for the first dozen runs at least.

        ---

        # 30-second "which zone?" checklist

        Before you build:

        - [ ] I can **reach** the input without manual steps
        - [ ] I can **describe the rules** in a paragraph
        - [ ] I'm OK with occasional errors, or I have a way to catch them
        - [ ] If the script misfires, the worst case is **easy to undo**

        **4 checks** → build it
        **3 checks** → build small, watch it run
        **2 or fewer** → don't automate yet. Do it by hand and learn the shape first.

        ---

        # 5-minute exercise

        1. Write down **three repetitive tasks** from your week
        2. For each: fill in **Input → Process → Output**
        3. For each: answer the **four R's** (reach, rules, reliability, risk)
        4. Sort them: **green** / **yellow** / **red**
        5. Build only the **green** ones this week
        6. Write one sentence for each **red** one explaining _why_ it's red

        That last sentence is often the most valuable thing you'll learn.

        # Functions

        --

        - Functions are a way to group code that performs a specific task

        --

        - Functions can take parameters and return values

        --

        - For example, a function that calculates the total cost of an item including tax

        --

        - We could do this by simply writing a script:

        --

        ```python
          # Arithmetic operation: multiplication of parameters
          tax = price * tax_rate
          # Arithmetic operation: addition of variables
          total = price + tax
        ```

        - But what if I want to re-use this code for different prices and tax rates?

        ---

        # Functions

        # What are Packages and Imports?

        **Package** = A collection of pre-written Python code (functions, classes) that you can reuse

        --

        **Import** = The command to bring a package into your script so you can use it

        --

        **Example:**

        ```python
        # Import the 'requests' package to make HTTP calls
        import requests

        # Now we can use functions from the requests package
        response = requests.get("https://api.example.com/data")
        print(response.json())
        ```

        --

        **Think of it like:**
        - Package = A toolbox full of tools
        - Import = Taking the toolbox out so you can use the tools
        - Using the package = Actually using the tools to build something

        --

        **Popular packages:** `requests` (HTTP calls), `pandas` (data analysis), `openai` (AI services)

        ---

        # Package Versions: What Does `x.x.x` Mean?

        Every package has a version number with **3 parts** — e.g., `requests==2.31.0`

        --

        | Number | Name | Changes when... |
        |--------|------|-----------------|
        | **2**.31.0 | **Major** | Breaking changes — old code may stop working |
        | 2.**31**.0 | **Minor** | New features added, backwards compatible |
        | 2.31.**0** | **Patch** | Bug fixes only, safe to update |

        --

        **Rule of thumb:**
        - Patch bumps → safe to update anytime
        - Minor bumps → usually safe, check changelog
        - Major bumps → read the migration guide ⚠️

        --

        ```python
        # Pinning exact versions = reproducible, predictable code
        requests==2.31.0   # this exact version
        requests>=2.31.0   # this version or newer
        requests~=2.31.0   # 2.31.x only (patch updates ok)
        ```

        # Run Your Scripts Like Commands (Mac/Linux)

        Turn `uv run ~/scripts/my_script.py` into a short command you can type anywhere.

        --

        1. Your script lives at a path, e.g. `~/scripts/my_script.py`

        2. Add an **alias** (or function for arguments) to `~/.aliases`:

        ```bash
        # Simple alias
        alias myscript='uv run ~/scripts/my_script.py'

        # Function — passes all arguments through with "$@"
        myscript() { uv run ~/scripts/my_script.py "$@"; }
        ```

        --

        3. **Source it** from your `~/.zshrc` or `~/.bashrc`:

        ```bash
        source ~/.aliases
        ```

        Now just type `myscript` from anywhere. 🎉

        ---

        # Run Your Scripts Like Commands (Windows)

        Same idea using a **PowerShell function** in your profile.

        --

        1. Open your profile: `notepad $PROFILE`

        2. Add a function (`@args` passes all arguments through):

        ```powershell
        function myscript { uv run C:\scripts\my_script.py @args }
        ```

        3. Reload it: `. $PROFILE` (or restart the terminal)

        --

        **Alternative — a batch file** named `myscript.cmd` in a folder on your PATH:

        ```cmd
        @echo off
        uv run C:\scripts\my_script.py %*
        ```

        `%*` passes all arguments through.

        # Using AI != Slop

        1. **Slop comes from vague prompts; craft comes from specific, capability-aware prompts.** Name the libraries, the input, and the exact behavior:

           > *"Write me a Python CLI tool using Click and boto3 which takes a URL of that form and then uses EVERY single boto3 trick in the book to try and debug why the file is returning a 404."* — Simon Willison

        --

        2. **Encode your conventions once** — reusable context beats one-off prompting. Save your standards in a Claude Project / system prompt so every output inherits them.

        --

        3. **Ship self-contained, runnable artifacts** — the same `uv run` + inline-dependency pattern this course already teaches means anyone can run your script with zero setup.

        --

        4. **You own what you run.** As Willison puts it, others can run your script *"provided you trust me not to have replaced the script with something malicious."* AI output is a draft **you** are accountable for.

        ---

        # Red → Green: Tell the AI Exactly What "Done" Means

        Write the check **first**, then let AI fill in the code.

        --

        - **RED**: write a test that describes the result you want — run it, watch it fail.

        --

        - **GREEN**: ask the AI to write code until the test passes.

        --

        - **Why**: a failing test first is a clear instruction the AI can't fudge — it stops the AI from "writing code that doesn't work, or ... unnecessary ... or both."

        > A "test" is just a tiny piece of code that says: *if my function works, this should be true.*

        ---

        # A 6-Line Example Beginners Can Read

        No framework needed — just a plain `assert`:

        ```python
        # RED: describe what "done" looks like
        # (this fails — get_headers doesn't exist yet)
        def test_get_headers():
            md = "# Title\n\nsome text\n## Section"
            assert get_headers(md) == ["Title", "Section"]

        test_get_headers()  # run it -> error = RED
        ```

        --

        Then the prompt to the AI:

        > *"Build a Python function `get_headers(markdown)` that returns the header text. Use red/green TDD."*

        --

        Once `test_get_headers()` runs with **no error**, you're **GREEN** — and you keep the test forever as a safety net. 🟢
